<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 500 500" width="500" height="500">

  <rect width="500" height="500" fill="#0a0a0a"/>

  <g fill="none" stroke="#ffffff" stroke-width="25.00"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- Crescent: semicircle arc, sweep-flag=1 → clockwise = arcs UPWARD -->
    <path d="M 192.50,162.50
             A 57.50,57.50 0 0,1
               307.50,162.50"/>

    <!-- Circle with gap below crescent -->
    <circle cx="250.00" cy="240.00" r="57.50"/>

    <!-- Vertical stem -->
    <line x1="250.00" y1="297.50"
          x2="250.00" y2="407.50"/>

    <!-- Crossbar -->
    <line x1="183.88" y1="343.70"
          x2="316.12" y2="343.70"/>

  </g>
</svg>